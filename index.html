<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>ZenPrende - Test de Bienestar Emocional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería para el confeti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Importamos fuentes similares a las del diseño: Pacifico para "Zen" y Montserrat para el resto -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zenTeal: '#00A8A8', /* Color cyan/verde principal */
                        zenDark: '#0B3B4C', /* Color oscuro para texto "Prende" */
                        zenLight: '#F3FAFA'
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        script: ['Pacifico', 'cursive'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Estilos personalizados para animaciones y scroll */
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Estilo para las opciones seleccionadas */
        .option-card { transition: all 0.2s; border: 2px solid transparent; }
        .option-card.selected { border-color: #00A8A8; background-color: rgba(0, 168, 168, 0.05); }
        .option-card:hover { background-color: rgba(0, 168, 168, 0.02); }

        /* Escondemos la barra de scroll para un look más de app */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Animación para las nuevas espirales: giran juntas para crear efecto 3D de listón */
        @keyframes spinSpiral { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(-50%); } 
        }
        .spiral-dark { animation: spinSpiral 12s linear infinite; }
        .spiral-light { animation: spinSpiral 12s linear infinite; }

        /* Efecto de puntos a pantalla completa al avanzar de pregunta */
        .fullscreen-points {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            animation: fadeInOut 1.1s ease-in-out forwards;
        }
        .fullscreen-points-text {
            font-size: 7rem;
            font-weight: 900;
            color: #00A8A8;
            text-shadow: 0 10px 25px rgba(0, 168, 168, 0.5);
            animation: zoomBounceFade 1.1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }
        @keyframes zoomBounceFade {
            0% { transform: scale(0.3) translateY(50px); opacity: 0; }
            25% { transform: scale(1.1) translateY(0); opacity: 1; }
            75% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(1.6) translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body class="bg-white text-gray-800 h-screen w-screen overflow-hidden flex flex-col">

    <!-- Controles Superiores (Inicio / Silenciar) -->
    <div class="fixed top-4 right-4 z-50 flex gap-3 opacity-60 hover:opacity-100 transition-opacity duration-300">
        <button onclick="goToMenu()" class="bg-zenDark text-white p-2 md:p-3 rounded-full shadow-lg backdrop-blur-md" title="Volver al Menú">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M218.83,103.77l-80-75.48a11.84,11.84,0,0,0-15.66,0l-80,75.48a12,12,0,0,0-3.92,10.79A11.87,11.87,0,0,0,48.54,124H56v84a12,12,0,0,0,12,12H188a12,12,0,0,0,12-12V124h7.46a11.87,11.87,0,0,0,9.29-9.44A12,12,0,0,0,218.83,103.77ZM184,204H152V156a12,12,0,0,0-12-12H116a12,12,0,0,0-12,12v48H72V108.84l56-52.83,56,52.83Z"></path></svg>
        </button>
        <button onclick="toggleMute()" id="mute-btn" class="bg-zenDark text-white p-2 md:p-3 rounded-full shadow-lg backdrop-blur-md" title="Silenciar / Activar Sonido">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M152,32V224a8,8,0,0,1-12.71,6.46L68.86,176H32a16,16,0,0,1-16-16V96A16,16,0,0,1,32,80H68.86l70.43-54.46A8,8,0,0,1,152,32Zm36.6,63.17a8,8,0,0,0-11.2,11.45A48.06,48.06,0,0,1,192,128a48,48,0,0,1-14.6,33.37,8,8,0,0,0,11.2,11.45A63.9,63.9,0,0,0,208,128,64.08,64.08,0,0,0,188.6,95.17Zm33.91-23.36a8,8,0,0,0-11,11.64A87.89,87.89,0,0,1,232,128a88.1,88.1,0,0,1-20.49,56.55,8,8,0,0,0,11,11.64A103.88,103.88,0,0,0,248,128,104.14,104.14,0,0,0,222.51,71.81Z"></path></svg>
        </button>
    </div>

    <!-- Contenedor Principal Adaptativo 100% -->
    <div id="app-container" class="w-full h-full relative flex flex-col bg-white overflow-y-auto overflow-x-hidden">
        
        <!-- Área de Contenido Dinámico (Centrado y ajustado para grandes pantallas) -->
        <main id="main-content" class="flex-grow flex flex-col w-full max-w-2xl mx-auto px-6 pt-10 pb-10 relative z-10 fade-in">
            <!-- El contenido se inyectará aquí vía JS -->
        </main>

        <!-- Footer fijo en la parte inferior, sin superponerse al contenido -->
        <footer class="w-full z-0 flex-shrink-0 mt-auto">
            
            <!-- Espirales Animadas (Ondas simétricas para bucle infinito sin cortes) -->
            <div class="relative w-full h-8 md:h-10 overflow-hidden mb-2">
                <!-- Espiral Oscura (Gruesa y pegada al centro) -->
                <svg class="absolute top-0 left-0 h-full w-[200%] spiral-dark" viewBox="0 0 200 20" preserveAspectRatio="none">
                    <path d="M0,10 Q25,8.5 50,10 T100,10 Q125,8.5 150,10 T200,10" stroke="#0B3B4C" stroke-width="6" fill="none" stroke-linecap="round"/>
                </svg>
                <!-- Espiral Clara (Delgada, entrelazada y súper pegada a la oscura) -->
                <svg class="absolute top-0 left-0 h-full w-[200%] spiral-light" viewBox="0 0 200 20" preserveAspectRatio="none">
                    <path d="M0,10 Q25,11.5 50,10 T100,10 Q125,11.5 150,10 T200,10" stroke="#00A8A8" stroke-width="4" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            
            <!-- Zona blanca para la imagen de logos de apoyo -->
            <div class="bg-white pb-8 md:pb-10 px-4 flex justify-center items-center">
                <img src="https://iili.io/q6OiS9f.png" alt="Proyecto apoyado con recursos del FIDEM" class="h-10 md:h-14 object-contain max-w-full">
            </div>
        </footer>

        <!-- Modal de Instrucciones (Oculto por defecto) -->
        <div id="instructions-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center hidden">
            <div class="bg-white rounded-3xl p-8 w-11/12 max-w-lg shadow-2xl transform scale-95 transition-transform duration-300 relative" id="modal-content">
                <!-- Botón X para cerrar -->
                <button onclick="closeInstructions()" class="absolute top-4 right-4 text-gray-400 hover:text-zenTeal transition p-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 256 256"><path d="M205.66,194.34a8,8,0,0,1-11.32,11.32L128,139.31,61.66,205.66a8,8,0,0,1-11.32-11.32L116.69,128,50.34,61.66A8,8,0,0,1,61.66,50.34L128,116.69l66.34-66.35a8,8,0,0,1,11.32,11.32L139.31,128Z"></path></svg>
                </button>
                <h3 class="text-2xl md:text-3xl font-bold text-zenDark mb-6 text-center mt-2">Instrucciones</h3>
                <p class="text-base md:text-lg text-gray-600 mb-8 text-center font-medium">
                    Responde con total honestidad. Selecciona la opción que mejor describa tu realidad en las últimas 4 semanas.
                </p>
                <button onclick="startTest()" class="w-full bg-zenTeal text-white font-bold text-lg md:text-xl py-4 rounded-full shadow-md hover:bg-opacity-90 transition transform hover:scale-105 active:scale-95">
                    ¡Comenzar Test!
                </button>
            </div>
        </div>
        
        <!-- Modal de "Otros Diagnósticos" (Oculto) -->
        <div id="diagnostics-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center hidden">
            <div class="bg-white rounded-3xl p-8 w-11/12 max-w-lg shadow-2xl max-h-[85vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl md:text-2xl font-bold text-zenDark">Todos los Diagnósticos</h3>
                    <button onclick="closeDiagnosticsModal()" class="text-gray-500 hover:text-red-500 font-bold text-3xl transition">&times;</button>
                </div>
                <div id="all-diagnostics-content" class="space-y-6">
                    <!-- Se inyecta por JS -->
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- SISTEMA DE SONIDO (WEB AUDIO API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let isMuted = false;
        
        // --- MÚSICA DE FONDO ---
        const bgMusic = new Audio('https://image2url.com/r2/default/audio/1774389168315-3ae04b26-f4be-4356-98f6-79aa63c7529a.mp3');
        bgMusic.loop = true;
        bgMusic.volume = 0.2; // Volumen suave del 20%
        
        function playTone(freq, type, duration, vol) {
            if (isMuted) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) { console.log("Audio no soportado"); }
        }

        const soundManager = {
            start: () => { playTone(440, 'sine', 0.1, 0.1); setTimeout(() => playTone(554, 'sine', 0.2, 0.15), 100); },
            select: () => { playTone(600, 'sine', 0.1, 0.05); },
            nav: () => { playTone(400, 'triangle', 0.15, 0.05); },
            modal: () => { playTone(700, 'sine', 0.1, 0.03); },
            success: () => { 
                playTone(523.25, 'sine', 0.1, 0.1); 
                setTimeout(() => playTone(659.25, 'sine', 0.1, 0.1), 100); 
                setTimeout(() => playTone(783.99, 'sine', 0.4, 0.15), 200); 
                setTimeout(() => playTone(1046.50, 'sine', 0.6, 0.2), 300); 
            }
        };

        // --- BASE DE DATOS DEL TEST ---
        const questions = [
            {
                id: 1,
                title: "Nivel de energía al despertar",
                options: [
                    { text: "A. Me siento descansado y listo para los retos.", points: 0 },
                    { text: "B. Me toma un café y un rato \"arrancar\", pero luego funciono.", points: 1 },
                    { text: "C. Siento que no dormí nada; el cansancio es físico y mental desde el minuto uno.", points: 2 }
                ]
            },
            {
                id: 2,
                title: "Relación con clientes y equipo",
                options: [
                    { text: "A. Disfruto la interacción y busco soluciones con empatía.", points: 0 },
                    { text: "B. A veces me saturan, pero logro mantener la profesionalidad.", points: 1 },
                    { text: "C. Me siento irritable; cualquier pregunta o error ajeno me genera un rechazo profundo.", points: 2 }
                ]
            },
            {
                id: 3,
                title: "Capacidad de enfoque y decisión",
                options: [
                    { text: "A. Tengo claridad sobre mis prioridades estratégicas.", points: 0 },
                    { text: "B. Me distraigo con facilidad, pero termino lo importante.", points: 1 },
                    { text: "C. Siento \"niebla mental\"; postergo decisiones simples por horas o días.", points: 2 }
                ]
            },
            {
                id: 4,
                title: "Manifestaciones físicas del estrés",
                options: [
                    { text: "A. Mi salud está estable y duermo bien.", points: 0 },
                    { text: "B. Dolores de espalda o cuello ocasionales por la tensión.", points: 1 },
                    { text: "C. Dolores de cabeza constantes, insomnio o problemas digestivos recurrentes.", points: 2 }
                ]
            },
            {
                id: 5,
                title: "Sentido de logro y satisfacción",
                options: [
                    { text: "A. Me emociono cuando alcanzamos una meta o cerramos una venta.", points: 0 },
                    { text: "B. Siento alivio al terminar las cosas, más que alegría.", points: 1 },
                    { text: "C. Los éxitos me dan igual; solo veo la siguiente montaña de problemas.", points: 2 }
                ]
            },
            {
                id: 6,
                title: "Desconexión digital y personal",
                options: [
                    { text: "A. Tengo horarios claros para apagar el celular y estar con mi familia/hobbies.", points: 0 },
                    { text: "B. Intento desconectar, pero reviso el correo \"por si acaso\" antes de dormir.", points: 1 },
                    { text: "C. No existe frontera; el trabajo invade mis cenas, mis sueños y mis descansos.", points: 2 }
                ]
            },
            {
                id: 7,
                title: "Tolerancia a la frustración",
                options: [
                    { text: "A. Entiendo que los errores son parte del proceso de aprendizaje.", points: 0 },
                    { text: "B. Me frustro, pero me calmo rápido para buscar la salida.", points: 1 },
                    { text: "C. Exploto o me hundo emocionalmente ante el más mínimo contratiempo.", points: 2 }
                ]
            },
            {
                id: 8,
                title: "Identidad personal vs. Negocio",
                options: [
                    { text: "A. Sé que soy mucho más que el éxito o fracaso de mi empresa.", points: 0 },
                    { text: "B. Me cuesta separar quién soy de lo que facturo.", points: 1 },
                    { text: "C. Si el negocio va mal, siento que mi valor como persona desaparece.", points: 2 }
                ]
            }
        ];

        const diagnoses = [
            {
                min: 0, max: 5,
                title: "Riesgo Bajo (Equilibrio Operativo)",
                color: "text-green-600",
                description: "Diagnóstico: Tienes un manejo saludable del estrés. Tu resiliencia es alta.",
                recommendation: "Recomendación: No bajes la guardia. Implementa un \"Día de Desconexión Total\" al mes. Asegúrate de que tus procesos estén documentados para que la empresa no dependa al 100% de tu presencia física."
            },
            {
                min: 6, max: 11,
                title: "Riesgo Moderado (Fase de Alerta)",
                color: "text-yellow-500",
                description: "Diagnóstico: Estás en \"modo supervivencia\". Tu cuerpo está gastando sus reservas de emergencia y la calidad de tu liderazgo está empezando a sufrir.",
                recommendation: "Recomendación: Haz una Auditoría de Energía. Delega o elimina esta semana al menos dos tareas que te quiten paz. Agenda el ocio como si fuera una cita con un inversionista: es inamovible."
            },
            {
                min: 12, max: 16,
                title: "Riesgo Alto (Burnout Inminente)",
                color: "text-red-500",
                description: "Diagnóstico: Estás en la zona de colapso. Tu salud y el futuro de tu empresa están en riesgo real. Operar así es como conducir un auto sin aceite: el motor se va a fundir.",
                recommendation: "Recomendación: Parada Técnica Obligatoria. Necesitas un mínimo de 3 días de desconexión absoluta. Busca un mentor, socio o psicólogo para redistribuir la carga. No es opcional, es una medida de rescate para tu negocio y tu vida."
            }
        ];

        // --- ESTADO DE LA APLICACIÓN ---
        let currentQuestionIndex = 0;
        let userAnswers = new Array(questions.length).fill(null); // Almacena el índice de la opción seleccionada [0, 1 o 2]

        // --- REFERENCIAS DOM ---
        const mainContent = document.getElementById('main-content');
        const instructionsModal = document.getElementById('instructions-modal');
        const modalContent = document.getElementById('modal-content');
        const diagnosticsModal = document.getElementById('diagnostics-modal');

        // --- FUNCIONES DE RENDERIZADO ---

        // Función auxiliar para renderizar el logo
        const renderLogo = (small = false) => `
            <div class="flex justify-center ${small ? 'mb-4' : 'mb-2'}">
                <img src="https://images4.imagebam.com/b2/58/2a/ME1BKPHI_o.png" alt="ZenPrende Logo" class="${small ? 'h-20 md:h-24' : 'h-28 md:h-36'} object-contain drop-shadow-sm">
            </div>
        `;

        // Vista Inicial (Home)
        function renderHome() {
            // Verificamos si ya hay un test activo para cambiar el botón
            const isTestStarted = userAnswers.some(ans => ans !== null) || currentQuestionIndex > 0;
            const btnText = isTestStarted ? 'Continuar Test' : 'Iniciar';
            const btnAction = isTestStarted ? 'resumeTest()' : 'showInstructions()';

            mainContent.innerHTML = `
                <div class="flex-grow flex flex-col justify-center items-center h-full mt-12 fade-in">
                    ${renderLogo()}
                    <h2 class="text-base md:text-xl font-semibold text-zenTeal mt-4 uppercase tracking-wide text-center">
                        TEST de Bienestar Emocional<br>
                        <span class="text-sm md:text-base text-zenTeal normal-case font-medium">para Líderes y Emprendedores</span>
                    </h2>
                    
                    <button onclick="${btnAction}" class="mt-16 bg-zenTeal text-white font-bold text-lg md:text-xl py-4 px-12 rounded-full shadow-lg hover:shadow-xl hover:bg-[#009696] transition-all transform hover:scale-105 active:scale-95">
                        ${btnText}
                    </button>
                </div>
            `;
        }

        // Vista de Preguntas
        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            const isFirst = currentQuestionIndex === 0;
            const isLast = currentQuestionIndex === questions.length - 1;
            const progressPercentage = ((currentQuestionIndex + 1) / questions.length) * 100;

            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                const isSelected = userAnswers[currentQuestionIndex] === idx;
                optionsHtml += `
                    <div onclick="selectOption(${idx})" class="option-card relative cursor-pointer p-5 rounded-xl mb-4 ${isSelected ? 'selected' : 'bg-gray-50'} shadow-sm hover:shadow-md md:text-lg">
                        <p class="text-sm md:text-base text-zenDark font-medium leading-relaxed pr-8">${opt.text}</p>
                    </div>
                `;
            });

            mainContent.innerHTML = `
                <div class="fade-in w-full max-w-xl mx-auto flex flex-col h-full">
                    <!-- Header Pequeño (Logo + Progreso) -->
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center">
                            <img src="https://images4.imagebam.com/b2/58/2a/ME1BKPHI_o.png" alt="ZenPrende Logo" class="h-10 md:h-12 object-contain">
                        </div>
                        <div class="bg-zenTeal text-white text-sm md:text-base font-bold py-1 px-4 rounded-full">
                            ${currentQuestionIndex + 1}/${questions.length}
                        </div>
                    </div>

                    <!-- Barra de progreso -->
                    <div class="w-full bg-gray-200 rounded-full h-2 mb-8">
                        <div class="bg-zenTeal h-2 rounded-full transition-all duration-300" style="width: ${progressPercentage}%"></div>
                    </div>

                    <!-- Subtítulo -->
                    <div class="text-center mb-8">
                        <h2 class="text-sm md:text-base font-bold text-zenTeal uppercase tracking-wide">
                            TEST de Bienestar Emocional
                        </h2>
                        <p class="text-xs md:text-sm text-zenTeal font-medium">para Líderes y Emprendedores</p>
                        <div class="w-24 h-1 bg-zenTeal mx-auto mt-2 rounded-full"></div>
                    </div>

                    <!-- Pregunta -->
                    <h3 class="text-xl md:text-2xl font-bold text-zenDark mb-4">Pregunta ${currentQuestionIndex + 1}</h3>
                    <h4 class="text-lg md:text-xl font-semibold text-zenTeal mb-8">${q.title}</h4>

                    <!-- Opciones -->
                    <div class="mb-10 flex-grow">
                        ${optionsHtml}
                    </div>

                    <!-- Navegación -->
                    <div class="flex ${isFirst ? 'justify-end' : 'justify-between'} mt-auto relative z-20">
                        ${!isFirst ? `<button onclick="prevQuestion()" class="bg-zenDark text-white font-bold py-3 px-8 rounded-full shadow hover:bg-opacity-90 transition md:text-lg">Atrás</button>` : ''}
                        
                        <!-- Botón actualizado para disparar el efecto a pantalla completa -->
                        <button id="btn-next" onclick="handleNextWithEffect(${isLast})" 
                            class="font-bold py-3 px-8 rounded-full shadow transition-all md:text-lg
                            ${userAnswers[currentQuestionIndex] !== null ? 'bg-zenTeal text-white hover:bg-opacity-90' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}"
                            ${userAnswers[currentQuestionIndex] !== null ? '' : 'disabled'}>
                            ${isLast ? 'Finalizar' : 'Siguiente'}
                        </button>
                    </div>
                </div>
            `;
        }

        // Vista de Resultados
        function renderResults() {
            // Calcular puntaje total
            let totalScore = 0;
            userAnswers.forEach((answerIndex, qIndex) => {
                totalScore += questions[qIndex].options[answerIndex].points;
            });

            // Encontrar diagnóstico
            const result = diagnoses.find(d => totalScore >= d.min && totalScore <= d.max);

            mainContent.innerHTML = `
                <div class="fade-in w-full max-w-xl mx-auto flex flex-col items-center mt-8">
                    ${renderLogo(true)}
                    
                    <div class="bg-white border-2 border-zenTeal rounded-3xl p-8 md:p-10 shadow-xl w-full text-center relative z-20 mb-8 mt-4">
                        <h3 class="text-sm md:text-base font-bold text-gray-500 uppercase mb-3">Tu Resultado</h3>
                        <div class="text-5xl md:text-6xl font-bold ${result.color} mb-3">${totalScore} <span class="text-xl text-gray-400">pts</span></div>
                        <h2 class="text-2xl md:text-3xl font-bold text-zenDark mb-4">${result.title}</h2>
                        <p class="text-base md:text-lg text-gray-600 mb-6">${result.description}</p>
                        <div class="bg-gray-50 p-4 md:p-6 rounded-xl border border-gray-100">
                            <p class="text-sm md:text-base font-semibold text-zenDark">${result.recommendation}</p>
                        </div>
                    </div>

                    <div class="flex flex-col md:flex-row gap-4 w-full relative z-20">
                        <button onclick="showDiagnosticsModal()" class="w-full bg-white border-2 border-zenTeal text-zenTeal font-bold py-4 rounded-full hover:bg-zenLight transition md:text-lg">
                            Ver otros puntajes
                        </button>
                        <button onclick="playAgain()" class="w-full bg-zenDark text-white font-bold py-4 rounded-full shadow-lg hover:bg-opacity-90 transition md:text-lg">
                            Repetir Test
                        </button>
                    </div>
                </div>
            `;
        }

        // --- LÓGICA E INTERACCIÓN ---

        function toggleMute() {
            isMuted = !isMuted;
            const muteBtn = document.getElementById('mute-btn');
            if (isMuted) {
                muteBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M215.39,165.94a8,8,0,0,1-11.31,0L184,145.94l-20.08,20a8,8,0,0,1-11.31-11.31l20-20-20-20.09a8,8,0,0,1,11.31-11.31l20.08,20,20.09-20a8,8,0,0,1,11.31,11.31l-20,20.09,20,20A8,8,0,0,1,215.39,165.94ZM152,32V224a8,8,0,0,1-12.71,6.46L68.86,176H32a16,16,0,0,1-16-16V96A16,16,0,0,1,32,80H68.86l70.43-54.46A8,8,0,0,1,152,32Z"></path></svg>`;
                bgMusic.pause();
            } else {
                muteBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M152,32V224a8,8,0,0,1-12.71,6.46L68.86,176H32a16,16,0,0,1-16-16V96A16,16,0,0,1,32,80H68.86l70.43-54.46A8,8,0,0,1,152,32Zm36.6,63.17a8,8,0,0,0-11.2,11.45A48.06,48.06,0,0,1,192,128a48,48,0,0,1-14.6,33.37,8,8,0,0,0,11.2,11.45A63.9,63.9,0,0,0,208,128,64.08,64.08,0,0,0,188.6,95.17Zm33.91-23.36a8,8,0,0,0-11,11.64A87.89,87.89,0,0,1,232,128a88.1,88.1,0,0,1-20.49,56.55,8,8,0,0,0,11,11.64A103.88,103.88,0,0,0,248,128,104.14,104.14,0,0,0,222.51,71.81Z"></path></svg>`;
                if (audioCtx.state === 'suspended') audioCtx.resume();
                bgMusic.play().catch(e => console.log("Esperando interacción para música"));
            }
        }

        // Función auxiliar para iniciar la música de forma segura cuando el usuario interactúa
        function playMusicSafe() {
            if (!isMuted && bgMusic.paused) {
                bgMusic.play().catch(e => console.log("Esperando interacción del usuario"));
            }
        }

        // --- EFECTOS DE VICTORIA (CONFETI Y VIBRACIÓN) ---
        function triggerVictoryEffects() {
            // 1. Hacer vibrar el dispositivo (Patrón: vibra, pausa, vibra)
            if ("vibrate" in navigator && !isMuted) {
                navigator.vibrate([200, 100, 300]); 
            }

            // 2. Lluvia de confeti moderada (solo una explosión elegante)
            const defaults = { colors: ['#00A8A8', '#22c55e', '#16a34a', '#86efac'], zIndex: 100 };
            
            confetti({
                ...defaults,
                particleCount: 40,
                angle: 60,
                spread: 55,
                origin: { x: 0, y: 0.6 }
            });
            confetti({
                ...defaults,
                particleCount: 40,
                angle: 120,
                spread: 55,
                origin: { x: 1, y: 0.6 }
            });
        }

        function goToMenu() {
            playMusicSafe();
            soundManager.nav();
            renderHome();
            document.getElementById('instructions-modal').classList.add('hidden');
            document.getElementById('diagnostics-modal').classList.add('hidden');
        }

        function showInstructions() {
            playMusicSafe();
            soundManager.modal();
            instructionsModal.classList.remove('hidden');
            // Pequeño timeout para la animación de entrada
            setTimeout(() => {
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeInstructions() {
            soundManager.modal();
            document.getElementById('instructions-modal').classList.add('hidden');
        }

        function startTest() {
            playMusicSafe();
            if (audioCtx.state === 'suspended' && !isMuted) audioCtx.resume();
            soundManager.start();
            instructionsModal.classList.add('hidden');
            modalContent.classList.add('scale-95');
            modalContent.classList.remove('scale-100');
            // Reiniciar estado si empezamos de nuevo
            currentQuestionIndex = 0;
            userAnswers.fill(null);
            renderQuestion();
        }

        function resumeTest() {
            playMusicSafe();
            if (audioCtx.state === 'suspended' && !isMuted) audioCtx.resume();
            soundManager.start();
            
            // Si el test ya estaba completamente contestado, ir a resultados directamente
            if (userAnswers.every(ans => ans !== null) && currentQuestionIndex === questions.length - 1) {
                calculateResults();
            } else {
                renderQuestion(); // Continuar desde la pregunta pendiente
            }
        }

        function selectOption(optionIndex) {
            soundManager.select();
            userAnswers[currentQuestionIndex] = optionIndex;
            updateOptionsUI(); // Actualizar el DOM sin re-renderizar para evitar el parpadeo de pantalla
        }

        function updateOptionsUI() {
            // 1. Actualizar las clases de las tarjetas de opciones
            const options = document.querySelectorAll('.option-card');
            options.forEach((opt, idx) => {
                if (idx === userAnswers[currentQuestionIndex]) {
                    opt.classList.add('selected');
                    opt.classList.remove('bg-gray-50');
                } else {
                    opt.classList.remove('selected');
                    opt.classList.add('bg-gray-50');
                }
            });

            // 2. Habilitar el botón Siguiente/Finalizar
            const nextBtn = document.getElementById('btn-next');
            if (nextBtn) {
                nextBtn.disabled = false;
                nextBtn.classList.remove('bg-gray-300', 'text-gray-500', 'cursor-not-allowed');
                nextBtn.classList.add('bg-zenTeal', 'text-white', 'hover:bg-opacity-90');
            }
        }

        // Nueva función para el efecto de transición con puntos a pantalla completa
        function handleNextWithEffect(isLast) {
            if (userAnswers[currentQuestionIndex] === null) return;
            
            // 1. Obtener puntos ganados
            const pts = questions[currentQuestionIndex].options[userAnswers[currentQuestionIndex]].points;
            
            // 2. Deshabilitar botón para evitar dobles clics
            const btnNext = document.getElementById('btn-next');
            if (btnNext) btnNext.disabled = true;

            // 3. Crear overlay de efecto visual
            const overlay = document.createElement('div');
            overlay.className = 'fullscreen-points';
            // Cambiar color del texto dependiendo de los puntos
            const textColor = pts === 0 ? '#10b981' : (pts === 1 ? '#f59e0b' : '#ef4444');
            overlay.innerHTML = `<div class="fullscreen-points-text" style="color: ${textColor}; text-shadow: 0 10px 25px ${textColor}80;">+${pts}</div>`;
            document.body.appendChild(overlay);

            // 4. Sonido especial de puntuación
            try {
                if (audioCtx.state === 'suspended' && !isMuted) audioCtx.resume();
                playTone(600 + (pts * 200), 'triangle', 0.1, 0.1);
                setTimeout(() => playTone(800 + (pts * 200), 'sine', 0.2, 0.15), 100);
            } catch(e){}

            // 5. Avanzar después de la animación
            setTimeout(() => {
                if (overlay.parentNode) overlay.remove();
                
                if (isLast) {
                    calculateResults();
                } else {
                    currentQuestionIndex++;
                    renderQuestion();
                    document.getElementById('app-container').scrollTop = 0;
                }
            }, 1050); // Ligeramente más rápido que la animación para una transición fluida
        }

        function nextQuestion() {
            // Esta función se mantiene por seguridad, pero la navegación real ahora la hace handleNextWithEffect
            if (userAnswers[currentQuestionIndex] !== null) {
                soundManager.nav();
                currentQuestionIndex++;
                renderQuestion();
                document.getElementById('app-container').scrollTop = 0;
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                soundManager.nav();
                currentQuestionIndex--;
                renderQuestion();
                document.getElementById('app-container').scrollTop = 0;
            }
        }

        function calculateResults() {
            soundManager.success();
            triggerVictoryEffects(); // Disparar confeti y vibración
            renderResults();
            document.getElementById('app-container').scrollTop = 0;
        }

        function playAgain() {
            playMusicSafe();
            soundManager.nav();
            // Solo aquí limpiamos el test al repetirlo intencionalmente
            currentQuestionIndex = 0;
            userAnswers.fill(null);
            renderHome();
            document.getElementById('app-container').scrollTop = 0;
        }

        function showDiagnosticsModal() {
            soundManager.modal();
            const container = document.getElementById('all-diagnostics-content');
            container.innerHTML = diagnoses.map((d, index) => {
                // Colores vibrantes y marcos sólidos para cada nivel
                const borderColors = ['border-green-500', 'border-yellow-500', 'border-red-500'];
                const bgHeaderColors = ['bg-green-500', 'bg-yellow-500', 'bg-red-500'];
                const textColors = ['text-green-700', 'text-yellow-700', 'text-red-700'];
                const bgContentColors = ['bg-green-50', 'bg-yellow-50', 'bg-red-50'];
                
                return `
                    <div class="relative overflow-hidden rounded-2xl border-2 ${borderColors[index]} bg-white shadow-md hover:shadow-lg transition-all transform hover:-translate-y-1 mb-6">
                        <!-- Cabecera de color sólido -->
                        <div class="${bgHeaderColors[index]} text-white px-5 py-3 flex justify-between items-center">
                            <h4 class="font-bold text-lg md:text-xl tracking-wide">${d.title}</h4>
                            <span class="bg-white ${textColors[index]} text-xs font-black px-3 py-1.5 rounded-full shadow-sm whitespace-nowrap ml-2">
                                ${d.min} - ${d.max} pts
                            </span>
                        </div>
                        <!-- Contenido con tipografía clara -->
                        <div class="p-5 ${bgContentColors[index]}">
                            <p class="text-sm md:text-base text-gray-800 font-semibold mb-3 leading-relaxed">${d.description}</p>
                            <div class="pt-3 border-t border-black border-opacity-10">
                                <p class="text-sm md:text-base text-gray-700 font-medium italic">${d.recommendation}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            diagnosticsModal.classList.remove('hidden');
        }

        function closeDiagnosticsModal() {
            soundManager.modal();
            diagnosticsModal.classList.add('hidden');
        }

        // Iniciar la app
        window.onload = renderHome;

    </script>
</body>
</html>
